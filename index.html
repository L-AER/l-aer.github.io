<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-AER | Official Press Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
  <header>
    <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active" aria-current="true"
          aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="img/1.jpg" class="bd-placeholder-img" width="100%" height="100%" aria-hidden="true"
            preserveAspectRatio="xMidYMid slice" focusable="false">
          <rect width="100%" height="100%" fill="#777" />
          <div class="container">
            <div class="carousel-caption text-start">
              <h1>¿Por qué es importante <br> identificar a nuestros animales de compañía?</h1>
              <p><a class="btn btn-lg btn-primary" href="page.html">Saber más</a></p>
            </div>
          </div>
        </div>
        <div class="carousel-item">
          <img src="img/2.jpg" class="bd-placeholder-img" width="100%" height="100%" aria-hidden="true"
            preserveAspectRatio="xMidYMid slice" focusable="false">
          <rect width="100%" height="100%" fill="#777" />
          <div class="container">
            <div class="carousel-caption text-end">
              <h1>Qué tener en cuenta antes de <br>
                adoptar un animal de compañia</h1>
              <p><a class="btn btn-lg btn-primary" href="page.html">Saber más</a></p>
            </div>
          </div>
        </div>
        <div class="carousel-item">
          <img src="img/3.jpg" class="bd-placeholder-img" width="100%" height="100%" aria-hidden="true"
            preserveAspectRatio="xMidYMid slice" focusable="false">
          <rect width="100%" height="100%" fill="#777" />
          <div class="container">
            <div class="carousel-caption text-end">
              <h1>¿Los perros sueñan?</h1>
              <p><a class="btn btn-lg btn-primary" href="page.html">Leer más</a></p>
            </div>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </header>

    <main>
        <section id="hero">
            <h1>L-AER</h1>
            <p>DJ & PRODUCER</p>
        </section>

        <!-- Sección de Música (Aquí pondrás el player después) -->
        <section id="music">
            <h2>Latest Mixes</h2>
            <!-- Tu código de SoundCloud irá aquí -->
        </section>

        <!-- Sección de Galería (Corregida) -->
        <section id="gallery" class="gallery-section">
            <h2>Gallery</h2>
            <div class="photo-grid">
                <div class="photo-item"><img src="assets/foto1.webp" alt="L-AER Live"></div>
                <div class="photo-item"><img src="assets/foto2.webp" alt="L-AER Studio"></div>
                <div class="photo-item"><img src="assets/foto3.webp" alt="L-AER Press"></div>
                <div class="photo-item"><img src="assets/foto4.webp" alt="L-AER Crowd"></div>
            </div>
        </section>
    </main>

  <footer class="footer mt-5 py-5 text-center">
    <p class="d-flex justify-content-between align-items-center small m-0">
      <a href="https://github.com/cristinachr" class="link-secondary">&copy; Cristina Chamorro 2021</a> <a href="#" class="float-end link-secondary">Regresar</a>
    </p>
  </footer>

    <script src="script.js"></script>
</body>
</html>
