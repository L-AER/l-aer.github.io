<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-AER | Official Press Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
    <header> <!-- Navegación -->
        <nav>
            <div class="logo">L-AER</div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>L-AER</h1>
            <p>DJ & PRODUCER</p>
        </section>

        <!-- Sección de Música (Aquí pondrás el player después) -->
        <section id="music">
            <h2>Latest Mixes</h2>
            <!-- Tu código de SoundCloud irá aquí -->
        </section>

        <!-- Sección de Galería (Corregida) -->
        <section id="gallery" class="gallery-section">
            <h2>Gallery</h2>
            <div class="photo-grid">
                <div class="photo-item"><img src="assets/foto1.webp" alt="L-AER Live"></div>
                <div class="photo-item"><img src="assets/foto2.webp" alt="L-AER Studio"></div>
                <div class="photo-item"><img src="assets/foto3.webp" alt="L-AER Press"></div>
                <div class="photo-item"><img src="assets/foto4.webp" alt="L-AER Crowd"></div>
            </div>
        </section>
    </main>

    <footer> <!-- Redes sociales -->
        <p>© 2024 L-AER Official Press Kit</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
